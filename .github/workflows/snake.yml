name: Generate Snake Animation

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%237C5CFC&color_dots=%23D7DBE2,%23D7DBE2,%23BFA4FF,%239B74FF,%237C5CFC

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
