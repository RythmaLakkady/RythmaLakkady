name: Generate Snake Animation

on:
  workflow_dispatch:

  push:
    branches:
      - main

  schedule:
    - cron: "0 0 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=%23FFE761&color_dots=%233A3F4B,%236B4FD3,%238F72F2,%23B89CFF,%23E9DCFF
            dist/github-contribution-grid-snake-light.svg?palette=github-light&color_snake=%237C5CFC&color_dots=%23ECECEC,%23D9C8FF,%23B89CFF,%23906AF5,%236B4FD3

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
