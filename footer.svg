<svg width="1600" height="140" viewBox="0 0 1600 140" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFE761"/>
    <stop offset="25%" stop-color="#FFF5AF"/>
    <stop offset="55%" stop-color="#FFFDF2"/>
    <stop offset="78%" stop-color="#E9D6FF"/>
    <stop offset="100%" stop-color="#C59BFF"/>
</linearGradient>

<radialGradient id="butter">
    <stop offset="0%" stop-color="#FFF9D4"/>
    <stop offset="100%" stop-color="#FFF9D4" stop-opacity="0"/>
</radialGradient>

<radialGradient id="lavender">
    <stop offset="0%" stop-color="#E9D7FF"/>
    <stop offset="100%" stop-color="#E9D7FF" stop-opacity="0"/>
</radialGradient>

<filter id="blur">
    <feGaussianBlur stdDeviation="40"/>
</filter>

</defs>

<!-- Background -->

<rect width="1600" height="140" rx="30" fill="url(#bg)"/>

<!-- Soft Blobs -->

<circle cx="180" cy="50" r="120" fill="url(#butter)" filter="url(#blur)"/>

<circle cx="1450" cy="90" r="140" fill="url(#lavender)" filter="url(#blur)"/>

